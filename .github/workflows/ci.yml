name: CI

on:
  push:
    branches:
      - main
      - release/**
      - codex/**
      - feature/**
      - fix/**
      - chore/**
  pull_request:
  workflow_dispatch:

env:
  GIT_COMMIT_SHA: ${{ github.sha }}
  VITE_APP_BUILD_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

  bundle:
    name: bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:bundle

  module-budgets:
    name: module-budgets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:module-budgets

  security-audit:
    name: security-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:security:audit

  release-hygiene:
    name: release-hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:release:hygiene

  device-qa-evidence:
    name: device-qa-evidence
    runs-on: ubuntu-latest
    if: ${{ vars.RELEASE_DEVICE_QA_REQUIRED == 'true' }}
    env:
      RELEASE_DEVICE_QA_REQUIRED: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:device-qa:evidence

  production-release:
    name: production-release
    runs-on: ubuntu-latest
    if: ${{ vars.PRODUCTION_RELEASE_REQUIRED == 'true' }}
    env:
      PRODUCTION_RELEASE_REQUIRED: 'true'
      RELEASE_DEVICE_QA_REQUIRED: 'true'
      OBSERVABILITY_SMOKE_URL: ${{ secrets.OBSERVABILITY_SMOKE_URL }}
      OBSERVABILITY_SMOKE_SECRET: ${{ secrets.OBSERVABILITY_SMOKE_SECRET }}
      SENTRY_ALERTS_VERIFIED: ${{ vars.SENTRY_ALERTS_VERIFIED }}
      SUPABASE_MIGRATION_VERIFIED: ${{ vars.SUPABASE_MIGRATION_VERIFIED }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:release:production

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  food-truth-unit:
    name: food-truth-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:food-truth:unit

  food-truth-integration:
    name: food-truth-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:food-truth:integration

  food-truth-preview:
    name: food-truth-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:food-truth:preview

  food-truth-benchmark:
    name: food-truth-benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Bootstrap benchmark summary
        if: ${{ !hashFiles('tests/fixtures/food-truth/manifest.json') }}
        run: |
          echo "BOOTSTRAP_PENDING_BENCHMARK_CORPUS" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Not a benchmark pass; corpus not landed yet" | tee -a "$GITHUB_STEP_SUMMARY"
      - run: npm run test:food-truth:benchmark

  food-truth-benchmark-guard:
    name: food-truth-benchmark-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Bootstrap benchmark guard summary
        if: ${{ !hashFiles('tests/fixtures/food-truth/manifest.json') }}
        run: |
          echo "BOOTSTRAP_PENDING_BENCHMARK_CORPUS" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "Not a benchmark pass; corpus not landed yet" | tee -a "$GITHUB_STEP_SUMMARY"
      - run: npm run test:food-truth:benchmark-guard

  food-truth-engineering-ready:
    name: food-truth-engineering-ready
    runs-on: ubuntu-latest
    env:
      MODE: production
      VITE_FF_IMPORT_TRUST_V1: 'true'
      VITE_FF_BARCODE_TRUTH_UI_V1: 'true'
      VITE_FF_LABEL_OCR_TRUST_V1: 'true'
      VITE_FF_BARCODE_PROVIDER_FATSECRET_V1: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run lint
      - run: npm run build
      - run: npm run test:food-truth:unit
      - run: npm run test:food-truth:integration
      - run: npm run test:food-truth:preview
      - run: npm run test:food-truth:benchmark
      - run: npm run test:food-truth:benchmark-guard
      - run: npm run test:food-truth:wave1-acceptance:auto
      - run: npm run test:food-truth:engineering-ready

  e2e-generic:
    name: e2e-generic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  e2e-lane-guard:
