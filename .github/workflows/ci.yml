      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:phase-planner:preview

  psmf-phase-baseline-guard:
    name: psmf-phase-baseline-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:psmf-phase:baseline-guard

  recovery-layer-domain:
    name: recovery-layer-domain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:recovery-layer:unit

  recovery-layer-replay:
    name: recovery-layer-replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:recovery-layer:replay

  recovery-layer-preview:
    name: recovery-layer-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:recovery-layer:preview

  recovery-layer-baseline-guard:
    name: recovery-layer-baseline-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:recovery-layer:baseline-guard

  garmin-connect-domain:
    name: garmin-connect-domain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:garmin-connect:unit

  garmin-preview:
    name: garmin-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:garmin-connect:preview

  psmf-garmin-domain:
    name: psmf-garmin-domain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:psmf-garmin:unit

  psmf-garmin-replay:
    name: psmf-garmin-replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:psmf-garmin:replay

  psmf-garmin-preview:
    name: psmf-garmin-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:psmf-garmin:preview

  psmf-garmin-baseline-guard:
    name: psmf-garmin-baseline-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:psmf-garmin:baseline-guard

  merge-gate:
    name: merge-gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - bundle
      - module-budgets
      - security-audit
      - release-hygiene
      - device-qa-evidence
      - production-release
      - unit
      - food-truth-engineering-ready
      - e2e-generic
      - e2e-lane-guard
      - psmf-phase-domain
      - psmf-phase-storage-integration
      - phase-planner-unit
      - recovery-layer-domain
      - garmin-connect-domain
      - psmf-garmin-domain
      - psmf-garmin-baseline-guard
    if: ${{ always() && github.event_name == 'pull_request' }}
    steps:
      - name: Verify required dependencies
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          BUNDLE_RESULT: ${{ needs.bundle.result }}
          MODULE_BUDGETS_RESULT: ${{ needs.module-budgets.result }}
          SECURITY_AUDIT_RESULT: ${{ needs.security-audit.result }}
          RELEASE_HYGIENE_RESULT: ${{ needs.release-hygiene.result }}
          DEVICE_QA_EVIDENCE_RESULT: ${{ needs.device-qa-evidence.result }}
          PRODUCTION_RELEASE_RESULT: ${{ needs.production-release.result }}
          UNIT_RESULT: ${{ needs.unit.result }}
          FOOD_TRUTH_ENGINEERING_READY_RESULT: ${{ needs.food-truth-engineering-ready.result }}
          E2E_GENERIC_RESULT: ${{ needs.e2e-generic.result }}
          E2E_LANE_GUARD_RESULT: ${{ needs.e2e-lane-guard.result }}
          PSMF_PHASE_DOMAIN_RESULT: ${{ needs.psmf-phase-domain.result }}
          PSMF_PHASE_STORAGE_INTEGRATION_RESULT: ${{ needs.psmf-phase-storage-integration.result }}
          PHASE_PLANNER_UNIT_RESULT: ${{ needs.phase-planner-unit.result }}
          RECOVERY_LAYER_DOMAIN_RESULT: ${{ needs.recovery-layer-domain.result }}
          GARMIN_CONNECT_DOMAIN_RESULT: ${{ needs.garmin-connect-domain.result }}
          PSMF_GARMIN_DOMAIN_RESULT: ${{ needs.psmf-garmin-domain.result }}
          PSMF_GARMIN_BASELINE_GUARD_RESULT: ${{ needs.psmf-garmin-baseline-guard.result }}
        run: |
          failed=0

          check_dependency() {
            local job="$1"
            local result="$2"

            if [ "$result" != "success" ]; then
              echo "::error::merge-gate dependency failed: ${job}=${result}"
              failed=1
            fi
          }

          check_dependency "lint" "$LINT_RESULT"
          check_dependency "build" "$BUILD_RESULT"
          check_dependency "bundle" "$BUNDLE_RESULT"
          check_dependency "module-budgets" "$MODULE_BUDGETS_RESULT"
          check_dependency "security-audit" "$SECURITY_AUDIT_RESULT"
          check_dependency "release-hygiene" "$RELEASE_HYGIENE_RESULT"
          if [ "$DEVICE_QA_EVIDENCE_RESULT" != "success" ] && [ "$DEVICE_QA_EVIDENCE_RESULT" != "skipped" ]; then
            echo "::error::merge-gate dependency failed: device-qa-evidence=${DEVICE_QA_EVIDENCE_RESULT}"
            failed=1
          fi
          if [ "$PRODUCTION_RELEASE_RESULT" != "success" ] && [ "$PRODUCTION_RELEASE_RESULT" != "skipped" ]; then
            echo "::error::merge-gate dependency failed: production-release=${PRODUCTION_RELEASE_RESULT}"
            failed=1
          fi
          check_dependency "unit" "$UNIT_RESULT"
          check_dependency "food-truth-engineering-ready" "$FOOD_TRUTH_ENGINEERING_READY_RESULT"
          check_dependency "e2e-generic" "$E2E_GENERIC_RESULT"
          check_dependency "e2e-lane-guard" "$E2E_LANE_GUARD_RESULT"
          check_dependency "psmf-phase-domain" "$PSMF_PHASE_DOMAIN_RESULT"
          check_dependency "psmf-phase-storage-integration" "$PSMF_PHASE_STORAGE_INTEGRATION_RESULT"
          check_dependency "phase-planner-unit" "$PHASE_PLANNER_UNIT_RESULT"
          check_dependency "recovery-layer-domain" "$RECOVERY_LAYER_DOMAIN_RESULT"
          check_dependency "garmin-connect-domain" "$GARMIN_CONNECT_DOMAIN_RESULT"
          check_dependency "psmf-garmin-domain" "$PSMF_GARMIN_DOMAIN_RESULT"
          check_dependency "psmf-garmin-baseline-guard" "$PSMF_GARMIN_BASELINE_GUARD_RESULT"

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

          echo "merge gate passed"

  release-confidence:
    name: release-confidence
    runs-on: ubuntu-latest
    needs:
      - lint
      - build
      - bundle
      - module-budgets
      - security-audit
      - release-hygiene
      - unit
      - food-truth-unit
      - food-truth-integration
      - food-truth-preview
      - food-truth-benchmark
      - food-truth-benchmark-guard
      - e2e-generic
      - e2e-lane-guard
      - e2e-coach-preview
      - e2e-personal-library-preview
      - psmf-phase-domain
      - psmf-phase-storage-integration
      - psmf-phase-replay
      - psmf-phase-preview
      - phase-planner-unit
      - phase-planner-preview
      - psmf-phase-baseline-guard
      - recovery-layer-domain
      - recovery-layer-replay
      - recovery-layer-preview
      - recovery-layer-baseline-guard
      - garmin-connect-domain
      - garmin-preview
      - psmf-garmin-domain
      - psmf-garmin-replay
      - psmf-garmin-preview
      - psmf-garmin-baseline-guard
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:release

  psmf-garmin-release-confidence:
    name: psmf-garmin-release-confidence
    runs-on: ubuntu-latest
    needs:
      - release-confidence
      - psmf-garmin-domain
      - psmf-garmin-replay
      - psmf-garmin-baseline-guard
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:psmf-garmin:release-confidence
